name: build-llamacpp-image

# Builds the slim llama.cpp autostart server image (GGUF serving, e.g.
# Qwen3.6-35B-A3B Q8 + vision) and pushes it to GHCR. Small image → fast build/pull.
# Separate from build-pod-image.yml (the vLLM image) so the two are independent.
#
# One-time after the first run: make the GHCR package PUBLIC so RunPod pulls it
# without credentials (profile → Packages → llamacpp-server → settings → Public).
#
# RunPod image: ghcr.io/<owner>/<repo>/llamacpp-server:latest

on:
  workflow_dispatch:
  push:
    paths:
      - docker/Dockerfile.llamacpp-server
      - docker/start-llama.sh
      - .github/workflows/build-llamacpp-image.yml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/llamacpp-server" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.llamacpp-server
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
